version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: proctorAI-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - proctorAI-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proctorAI-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SQLITE_DB_URL=sqlite+aiosqlite:///./proctorai.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars
      - DEBUG=false
      - ADMIN_EMAIL=admin@saveetha.com
      - ADMIN_PASSWORD=Admin@123
      - SAVEETHA_DOMAIN=saveetha.com
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - proctorAI-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proctorAI-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - proctorAI-network

  nginx:
    image: nginx:alpine
    container_name: proctorAI-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - proctorAI-network

volumes:
  redis_data:
  backend_uploads:

networks:
  proctorAI-network:
    driver: bridge
