version: '3.9'

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: proctorAI-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: proctorAI
      MONGO_INITDB_ROOT_PASSWORD: proctorAI_secret_2024
      MONGO_INITDB_DATABASE: proctorAI
    volumes:
      - mongo_data:/data/db
    networks:
      - proctorAI-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: proctorAI-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - proctorAI-network

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proctorAI-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://proctorAI:proctorAI_secret_2024@mongodb:27017/proctorAI?authSource=admin
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars
      - DEBUG=false
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - ml_models:/app/ml/models
    depends_on:
      - mongodb
      - redis
    networks:
      - proctorAI-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proctorAI-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - proctorAI-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: proctorAI-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - proctorAI-network

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
  ml_models:

networks:
  proctorAI-network:
    driver: bridge
